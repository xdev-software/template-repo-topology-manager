name: Distribute

on:
  workflow_dispatch:
    inputs:
      no_automatic_merge:
        type: boolean
        description: 'No automatic merge'
        default: false
      max-parallel:
        type: number
        description: 'Maximum amount of parallel tasks to run'
        default: 1
      repositories:
        description: 'Specify the exact repositories to run on'

# env:
#  REMOTE_BRANCH: master

# permissions:
#   contents: write
#   pull-requests: write

jobs:
  find-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix-params: ${{ steps.detect-repos.outcome.matrix-params }}
    steps:
      - name: Detect repos
        id: detect-repos
        run: |
          echo "${{ secrets.UPDATE_FROM_TEMPLATE_PAT }}" | gh auth login --with-token

          declare -a ORGS=("xdev-software")

          for ORG in "${ORGS[@]}"
          do
            echo "Getting repos for $ORG"
            gh repo list --no-archived -L 1000 $ORG --json nameWithOwner --jq '.[].nameWithOwner' >> found-repos.txt
          done

          cat found-repos.txt | while read REPO
          do
            echo "Checking $REPO"

            TSV_RESPONSE=$(curl --fail -s -L \
              -H "Accept: application/vnd.github.raw+json" \
              -H "Authorization: Bearer ${{ secrets.UPDATE_FROM_TEMPLATE_PAT }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/$REPO/contents/.config/upstream.yml \
              | yq -r '.[]|[.url, .branch] | @tsv')
            
            if [[ -z "$TSV_RESPONSE" ]]; then
              echo "$REPO: upstream.yml does not exist or is invalid"
              continue
            fi

            echo "$TSV_RESPONSE" | while IFS=$'\t' read -r ORIGIN_URL ORIGIN_BRANCH; do

              if [[ $ORIGIN_URL != https://github.com/xdev-software/* ]]; then
                echo "$REPO: Ignoring invalid upstream: $ORIGIN_URL"
                continue;
              fi

              cat <<EOF >> parameters.yml
          - target: '$REPO'
            origin_url: '$ORIGIN_URL'
            origin_branch: '$ORIGIN_BRANCH'
          EOF
            done
          done

          cat parameters.yml
          yq -p yaml -o json parameters.yml > "$GITHUB_OUTPUT"

  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: 
      - find-repos
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.find-repos.outputs.matrix-params) }}
    steps:
      - name: Test
        run: |
          echo ${{ matrix.target }}
          echo ${{ matrix.origin_url }} ${{ matrix.origin_branch }}

